# .github/workflows/blog-schedule.yml
#
# Twice-weekly blog auto-poster.
#
# Runs /app/publish-blog.js which:
#   1. Picks a topic from the rotation (date-driven — Mon vs Thu ≠ same topic)
#   2. Drafts an article with Gemini 2.5 Flash
#   3. Pushes the caption to your Buffer Ideas board
#
# Cron:  Mon + Thu, 09:00 UTC.
# Manual: use the "Run workflow" button in the Actions tab (workflow_dispatch)
#         to trigger anytime — set `dry_run: true` to draft without pushing.
#
# Required repo secrets (GitHub → Settings → Secrets and variables → Actions):
#   BUFFER_ACCESS_TOKEN   — Buffer personal API key from publish.buffer.com/settings/api
#   BUFFER_ORG_ID         — Buffer organization ID
#   GEMINI_API_KEY        — Google AI Studio API key with Gemini access

name: Blog auto-poster (twice weekly)

on:
  schedule:
    # `cron` values are UTC. Mon (1) + Thu (4) at 09:00.
    # GitHub Actions may delay scheduled runs by up to ~15 minutes during
    # peak load — that's fine for a blog post.
    - cron: "0 9 * * 1,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — draft the article but do NOT push to Buffer"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      topic_idx:
        description: "Force topic index (0-based) — leave blank for date-driven pick"
        required: false
        default: ""
        type: string

concurrency:
  # Never run two blog jobs at once — Buffer will happily create duplicate
  # Ideas from a duplicate trigger.
  group: blog-auto-poster
  cancel-in-progress: false

jobs:
  publish:
    name: Draft + push to Buffer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 has stable global fetch — the script depends on it.
          node-version: "20"

      - name: Install dependencies
        # `publish-blog.js` is deliberately dependency-free (uses global
        # fetch, no npm packages). The step exists for two reasons:
        #   1. It's the standard shape reviewers expect in a Node workflow.
        #   2. If we ever add a package.json alongside the script, this
        #      will pick it up automatically without editing the workflow.
        run: |
          if [ -f package.json ]; then
            npm ci --prefer-offline --no-audit
          else
            echo "No package.json at repo root — publish-blog.js is dependency-free, skipping install."
          fi

      - name: Run publish-blog.js
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_ORG_ID:       ${{ secrets.BUFFER_ORG_ID }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          # Optional override — pin the model here if you want to trial
          # a different Gemini SKU without touching code.
          GEMINI_TEXT_MODEL:   ${{ vars.GEMINI_TEXT_MODEL || 'gemini-2.5-flash' }}
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if [ -n "${{ inputs.topic_idx }}" ]; then FLAGS="$FLAGS --topic=${{ inputs.topic_idx }}"; fi
          echo "Running: node publish-blog.js $FLAGS"
          node publish-blog.js $FLAGS
