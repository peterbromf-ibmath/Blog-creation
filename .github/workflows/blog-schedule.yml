name: Blog auto-poster on: schedule: - cron: "0 9 * * 1,4" workflow_dispatch: inputs: dry_run: description: "Dry run" required: false default: "false" type: string topic_idx: description: "Topic index" required: false default: "" type: string jobs: publish: runs-on: ubuntu-latest steps: - uses: actions/checkout@v4 - uses: actions/setup-node@v4 with: node-version: "20" - name: Run script env: BUFFER_ACCESS_TOKEN: $%7B%7B+secrets.BUFFER_ACCESS_TOKEN+%7D%7D BUFFER_PROFILE_ID: $%7B%7B+secrets.BUFFER_PROFILE_ID+%7D%7D GEMINI_API_KEY: $%7B%7B+secrets.GEMINI_API_KEY+%7D%7D run: | FLAGS="" if [ "$%7B%7B+github.event.inputs.dry_run+%7D%7D" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi if [ -n "$%7B%7B+github.event.inputs.topic_idx+%7D%7D" ]; then FLAGS="$FLAGS --topic=$%7B%7B+github.event.inputs.topic_idx+%7D%7D"; fi node publish-blog.js $FLAGS
