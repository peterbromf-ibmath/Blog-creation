name: Blog auto-poster (twice weekly) on: schedule: # Mon (1) + Thu (4) at 09:00 UTC. - cron: "0 9 * * 1,4" workflow_dispatch: inputs: dry_run: description: "Dry run — draft the article but do NOT push to Buffer" required: false default: "false" type: choice options: - "false" - "true" topic_idx: description: "Force topic index (0-based) — leave blank for date-driven pick" required: false default: "" type: string concurrency: group: blog-auto-poster cancel-in-progress: false jobs: publish: name: Draft + push to Buffer runs-on: ubuntu-latest timeout-minutes: 10 permissions: contents: read steps: - name: Checkout repo uses: actions/checkout@v4 - name: Set up Node.js uses: actions/setup-node@v4 with: node-version: "20" - name: Install dependencies run: | if [ -f package.json ]; then npm ci --prefer-offline --no-audit else echo "No package.json at repo root — skipping install." fi - name: Run publish-blog.js env: BUFFER_ACCESS_TOKEN: $%7B%7B+secrets.BUFFER_ACCESS_TOKEN+%7D%7D BUFFER_ORG_ID: $%7B%7B+secrets.BUFFER_ORG_ID+%7D%7D BUFFER_PROFILE_ID: $%7B%7B+secrets.BUFFER_PROFILE_ID+%7D%7D GEMINI_API_KEY: $%7B%7B+secrets.GEMINI_API_KEY+%7D%7D GEMINI_TEXT_MODEL: $%7B%7B+vars.GEMINI_TEXT_MODEL+%7C%7C+%27gemini-1.5-flash%27+%7D%7D run: | FLAGS="" if [ "$%7B%7B+inputs.dry_run+%7D%7D" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi if [ -n "$%7B%7B+inputs.topic_idx+%7D%7D" ]; then FLAGS="$FLAGS --topic=$%7B%7B+inputs.topic_idx+%7D%7D"; fi echo "Running: node publish-blog.js $FLAGS" node publish-blog.js $FLAGS 
